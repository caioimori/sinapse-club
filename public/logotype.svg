<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 120" fill="none">
  <defs>
    <linearGradient id="lt-pulse" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="lt-node-left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="lt-node-right" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&amp;display=swap');
    </style>
  </defs>

  <!-- Inline logo mark (simplified for logotype scale) -->
  <!-- Left node -->
  <circle cx="36" cy="60" r="18" fill="url(#lt-node-left)"/>
  <circle cx="36" cy="60" r="10" fill="white" opacity="0.2"/>
  <circle cx="36" cy="60" r="5" fill="white" opacity="0.3"/>

  <!-- Connection arcs -->
  <path d="M 50 60 C 65 30, 85 30, 100 60" stroke="url(#lt-pulse)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.9"/>
  <path d="M 50 60 C 65 90, 85 90, 100 60" stroke="url(#lt-pulse)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.9"/>

  <!-- Outer arcs -->
  <path d="M 46 60 C 58 22, 92 22, 104 60" stroke="#7C3AED" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.25"/>
  <path d="M 46 60 C 58 98, 92 98, 104 60" stroke="#06B6D4" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.25"/>

  <!-- Pulse dots -->
  <circle cx="68" cy="40" r="3" fill="#7C3AED" opacity="0.6"/>
  <circle cx="75" cy="36" r="3.5" fill="url(#lt-pulse)" opacity="0.8"/>
  <circle cx="82" cy="40" r="3" fill="#06B6D4" opacity="0.6"/>

  <!-- Right node -->
  <circle cx="104" cy="60" r="18" fill="url(#lt-node-right)"/>
  <circle cx="104" cy="60" r="10" fill="white" opacity="0.2"/>
  <circle cx="104" cy="60" r="5" fill="white" opacity="0.3"/>

  <!-- Left dendrites -->
  <line x1="24" y1="47" x2="14" y2="36" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="22" y1="56" x2="10" y2="54" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="24" y1="73" x2="14" y2="84" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <circle cx="12" cy="34" r="2" fill="#7C3AED" opacity="0.45"/>
  <circle cx="12" cy="86" r="2" fill="#7C3AED" opacity="0.45"/>

  <!-- Right dendrites -->
  <line x1="116" y1="47" x2="126" y2="36" stroke="#06B6D4" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="118" y1="56" x2="130" y2="54" stroke="#06B6D4" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="116" y1="73" x2="126" y2="84" stroke="#06B6D4" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <circle cx="128" cy="34" r="2" fill="#06B6D4" opacity="0.45"/>
  <circle cx="128" cy="86" r="2" fill="#06B6D4" opacity="0.45"/>

  <!-- Text: "sinapse" bold -->
  <text x="152" y="76" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#1E1B4B" letter-spacing="-1">sinapse</text>

  <!-- Text: ".club" lighter -->
  <text x="448" y="76" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="52" font-weight="400" fill="#7C3AED" letter-spacing="-1">.club</text>
</svg>