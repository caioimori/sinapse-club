<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="fav-pulse" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="fav-left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="fav-right" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <!-- Connection arcs -->
  <path d="M 10 16 C 13 8, 19 8, 22 16" stroke="url(#fav-pulse)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M 10 16 C 13 24, 19 24, 22 16" stroke="url(#fav-pulse)" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Left node -->
  <circle cx="9" cy="16" r="5.5" fill="url(#fav-left)"/>
  <circle cx="9" cy="16" r="2.5" fill="white" opacity="0.3"/>

  <!-- Right node -->
  <circle cx="23" cy="16" r="5.5" fill="url(#fav-right)"/>
  <circle cx="23" cy="16" r="2.5" fill="white" opacity="0.3"/>

  <!-- Center pulse dot -->
  <circle cx="16" cy="10.5" r="1.5" fill="url(#fav-pulse)" opacity="0.8"/>
</svg>