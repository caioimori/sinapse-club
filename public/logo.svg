<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="node-left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="node-right" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="glow-purple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Central arc / synapse connection -->
  <path d="M 156 256 C 210 160, 302 160, 356 256" stroke="url(#pulse)" stroke-width="18" stroke-linecap="round" fill="none" opacity="0.9"/>
  <path d="M 156 256 C 210 352, 302 352, 356 256" stroke="url(#pulse)" stroke-width="18" stroke-linecap="round" fill="none" opacity="0.9"/>

  <!-- Secondary arcs — outer neural pathways -->
  <path d="M 136 256 C 180 128, 332 128, 376 256" stroke="#7C3AED" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.35"/>
  <path d="M 136 256 C 180 384, 332 384, 376 256" stroke="#06B6D4" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.35"/>

  <!-- Tertiary arcs — faintest layer -->
  <path d="M 116 256 C 155 100, 357 100, 396 256" stroke="#7C3AED" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.15"/>
  <path d="M 116 256 C 155 412, 357 412, 396 256" stroke="#06B6D4" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.15"/>

  <!-- Left node (pre-synaptic) -->
  <circle cx="140" cy="256" r="48" fill="url(#node-left)" filter="url(#glow-purple)"/>
  <circle cx="140" cy="256" r="28" fill="white" opacity="0.2"/>
  <circle cx="140" cy="256" r="16" fill="white" opacity="0.3"/>

  <!-- Right node (post-synaptic) -->
  <circle cx="372" cy="256" r="48" fill="url(#node-right)" filter="url(#glow-cyan)"/>
  <circle cx="372" cy="256" r="28" fill="white" opacity="0.2"/>
  <circle cx="372" cy="256" r="16" fill="white" opacity="0.3"/>

  <!-- Pulse dots along the connection — signal transmission -->
  <circle cx="208" cy="204" r="7" fill="#7C3AED" opacity="0.7"/>
  <circle cx="256" cy="192" r="9" fill="url(#pulse)" opacity="0.85"/>
  <circle cx="304" cy="204" r="7" fill="#06B6D4" opacity="0.7"/>

  <circle cx="208" cy="308" r="7" fill="#7C3AED" opacity="0.7"/>
  <circle cx="256" cy="320" r="9" fill="url(#pulse)" opacity="0.85"/>
  <circle cx="304" cy="308" r="7" fill="#06B6D4" opacity="0.7"/>

  <!-- Small dendrite branches from left node -->
  <line x1="108" y1="220" x2="80" y2="188" stroke="#7C3AED" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
  <line x1="100" y1="248" x2="64" y2="240" stroke="#7C3AED" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
  <line x1="108" y1="292" x2="80" y2="324" stroke="#7C3AED" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
  <line x1="100" y1="264" x2="64" y2="272" stroke="#7C3AED" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
  <circle cx="76" cy="184" r="5" fill="#7C3AED" opacity="0.5"/>
  <circle cx="60" cy="238" r="4" fill="#7C3AED" opacity="0.35"/>
  <circle cx="76" cy="328" r="5" fill="#7C3AED" opacity="0.5"/>
  <circle cx="60" cy="274" r="4" fill="#7C3AED" opacity="0.35"/>

  <!-- Small dendrite branches from right node -->
  <line x1="404" y1="220" x2="432" y2="188" stroke="#06B6D4" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
  <line x1="412" y1="248" x2="448" y2="240" stroke="#06B6D4" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
  <line x1="404" y1="292" x2="432" y2="324" stroke="#06B6D4" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
  <line x1="412" y1="264" x2="448" y2="272" stroke="#06B6D4" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
  <circle cx="436" cy="184" r="5" fill="#06B6D4" opacity="0.5"/>
  <circle cx="452" cy="238" r="4" fill="#06B6D4" opacity="0.35"/>
  <circle cx="436" cy="328" r="5" fill="#06B6D4" opacity="0.5"/>
  <circle cx="452" cy="274" r="4" fill="#06B6D4" opacity="0.35"/>
</svg>