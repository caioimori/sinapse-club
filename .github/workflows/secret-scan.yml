name: Secret scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Free license for private repos from gitleaks author.
          # Set GITLEAKS_LICENSE in repo secrets if needed; otherwise this runs
          # in the free mode with reduced features.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
